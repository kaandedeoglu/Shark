name: Swift

on:
  push:
    branches: [ master, 2.0 ]
  pull_request:
    branches: [ master, 2.0 ]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4
    - uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable
    - name: Build
      run: swift build -v
    - name: Test
      run: swift test
    - name: Smoke test synthetic fixtures
      run: Scripts/smoke-fixtures.sh
